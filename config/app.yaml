app:
  name: "StreamTail"
  version: "1.1.0"
  check_interval: 15

platforms:
  twitch:
    enabled: true
    client_id: "YOUR_TWITCH_CLIENT_ID"
    token: "YOUR_TWITCH_OAUTH_TOKEN"
    broadcaster_id: "YOUR_TWITCH_USER_ID"

  youtube:
    enabled: false
    token: "YOUR_YOUTUBE_OAUTH_TOKEN"
    broadcast_id: "YOUR_BROADCAST_ID"

  livevk:
    enabled: false
    token: "YOUR_VK_ACCESS_TOKEN"
    owner_id: "YOUR_OWNER_ID"

favorites:
  games:
    - "Just Chatting"
    - "Software Development"
    - "Minecraft"
    - "Dota 2"
    - "Cyberpunk 2077"
