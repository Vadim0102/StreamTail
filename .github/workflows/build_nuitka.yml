name: Build Nuitka Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        include:
          - os: windows-latest
            artifact_name: StreamTail-Windows-Releases

          - os: ubuntu-22.04
            artifact_name: StreamTail-Linux
            nuitka_flags: "--onefile"
            upload_path: "build_dist/StreamTail-Linux"

          - os: macos-latest
            artifact_name: StreamTail-macOS
            nuitka_flags: "--macos-disable-console --macos-create-app-bundle"
            upload_path: "StreamTail-macOS.zip"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -U nuitka

    - name: Extract version from app/core/__init__.py
      id: get_version
      shell: bash
      run: |
        cat << 'EOF' > get_version.py
        import re
        with open("app/core/__init__.py", "r", encoding="utf-8") as f:
            text = f.read()
        
        ver_match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', text)
        ver = ver_match.group(1) if ver_match else "2.1.0"
        
        clean_ver = re.sub(r'[^0-9.]', '', ver.split('-')[0])
        parts = clean_ver.split('.')
        while len(parts) < 4:
            parts.append('0')
        win_ver = '.'.join(parts[:4])
        
        print(f"APP_VERSION={ver}")
        print(f"WIN_VERSION={win_ver}")
        EOF
        
        python get_version.py >> $GITHUB_ENV
        rm get_version.py

    # --- Windows: Сборка Portable-версии (Standalone) ---
    - name: Build Portable Standalone (Windows only)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        python -m nuitka --standalone \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --include-package=uvicorn \
                         --include-package=plyer \
                         --include-package=app \
                         --windows-icon-from-ico=assets/icon.ico \
                         --include-data-dir=assets=assets \
                         --file-version=${{ env.WIN_VERSION }} \
                         --product-version=${{ env.WIN_VERSION }} \
                         --windows-company-name=Vadim0102 \
                         --windows-product-name=StreamTail \
                         --windows-console-mode=attach \
                         --output-filename=StreamTail \
                         --output-dir=build_standalone \
                         --assume-yes-for-downloads \
                         main.py

        mkdir -p build_dist/StreamTail-Portable
        cp -r build_standalone/main.dist/* build_dist/StreamTail-Portable/
        
        # Архивация Portable-версии
        powershell -Command "Compress-Archive -Path build_dist/StreamTail-Portable -DestinationPath build_dist/StreamTail-Portable.zip -Force"

    # --- Windows: Сборка Одного файла (Onefile) ---
    - name: Build Onefile Executable (Windows only)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        python -m nuitka --onefile \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --include-package=uvicorn \
                         --include-package=plyer \
                         --include-package=app \
                         --windows-icon-from-ico=assets/icon.ico \
                         --include-data-dir=assets=assets \
                         --file-version=${{ env.WIN_VERSION }} \
                         --product-version=${{ env.WIN_VERSION }} \
                         --windows-company-name=Vadim0102 \
                         --windows-product-name=StreamTail \
                         --windows-console-mode=attach \
                         --output-filename=StreamTail-Onefile \
                         --output-dir=build_onefile \
                         --assume-yes-for-downloads \
                         main.py

        cp build_onefile/StreamTail-Onefile.exe build_dist/StreamTail-Onefile.exe

    # --- Windows: Сборка только полного инсталлятора ---
    - name: Compile Windows Full Installer
      if: matrix.os == 'windows-latest'
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer_full.iss

    - name: Organize Windows Installer Outputs
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cp build_installer/StreamTail-Full-Installer.exe build_dist/StreamTail-Full-Installer.exe

    # --- Linux & macOS: Стандартная сборка ---
    - name: Build with Nuitka (Linux and macOS)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        python -m nuitka --standalone \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --include-package=uvicorn \
                         --include-package=plyer \
                         --include-package=app \
                         --include-data-dir=assets=assets \
                         --file-version=${{ env.WIN_VERSION }} \
                         --product-version=${{ env.WIN_VERSION }} \
                         --output-filename=StreamTail \
                         --output-dir=build_dist \
                         --assume-yes-for-downloads \
                         ${{ matrix.nuitka_flags }} \
                         main.py

    - name: Post-process Linux build
      if: matrix.os == 'ubuntu-22.04'
      shell: bash
      run: |
        if [ -f build_dist/StreamTail.bin ]; then
          mv build_dist/StreamTail.bin build_dist/StreamTail-Linux
        else
          mv build_dist/StreamTail build_dist/StreamTail-Linux
        fi

    - name: Post-process macOS build (Create ZIP of .app bundle)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mv build_dist/main.app build_dist/StreamTail.app
        cd build_dist
        zip -r ../StreamTail-macOS.zip StreamTail.app

    # --- Загрузка готовых релизов ---
    - name: Upload Windows Artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build_dist/StreamTail-Onefile.exe
          build_dist/StreamTail-Portable.zip
          build_dist/StreamTail-Full-Installer.exe

    - name: Upload Linux Artifact
      if: matrix.os == 'ubuntu-22.04'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.upload_path }}

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.upload_path }}
