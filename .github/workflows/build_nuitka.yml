name: Build Nuitka Executables

on:
  push:
    branches: [ main, master ] # Запуск при пуше в основную ветку (main или master)
  workflow_dispatch:           # Возможность ручного запуска из интерфейса GitHub

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        include:
          - os: windows-latest
            artifact_name: StreamTail-Windows
            # Настройки Windows: скрываем консоль, задаем метаданные .exe файла
            nuitka_flags: "--windows-console-mode=disable --windows-company-name=Vadim0102 --windows-product-name=StreamTail"
            upload_path: "build_dist/StreamTail-Windows.exe"
            
          - os: ubuntu-22.04
            artifact_name: StreamTail-Linux
            nuitka_flags: ""
            upload_path: "build_dist/StreamTail-Linux"
            
          - os: macos-latest
            artifact_name: StreamTail-macOS
            # Настройки macOS: скрываем консоль, генерируем приложение в формате .app бандла
            nuitka_flags: "--macos-disable-console --macos-create-app-bundle"
            upload_path: "StreamTail-macOS.zip"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: Extract version from app/core/__init__.py
      id: get_version
      shell: bash
      run: |
        # Считываем версию с явным указанием кодировки UTF-8 для обхода ограничений Windows
        VERSION=$(python -c "with open('app/core/__init__.py', encoding='utf-8') as f: exec(f.read()); print(__version__)")
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted Version: $VERSION"

    - name: Build with Nuitka
      shell: bash # Запуск строго в bash на всех ОС для корректной работы переноса строк через "\"
      run: |
        # --standalone: создание переносимой папки со всеми библиотеками
        # --onefile: упаковка всех зависимостей в единый исполняемый файл
        # --enable-plugin=tk-inter: интеграция библиотек Tcl/Tk для GUI на Tkinter
        # --include-package-data=sv_ttk: включение всех ресурсов темы оформления sv-ttk
        # --include-package: принудительное включение uvicorn и plyer для обхода проблем динамического импорта
        # --accept-downloads: автоматическая загрузка Dependency Walker без прерывания сборки вопросами
        python -m nuitka --standalone \
                         --onefile \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --include-package=uvicorn \
                         --include-package=plyer \
                         --file-version=${{ env.APP_VERSION }} \
                         --product-version=${{ env.APP_VERSION }} \
                         --output-dir=build_dist \
                         --accept-downloads \
                         ${{ matrix.nuitka_flags }} \
                         main.py

    - name: Post-process Windows build
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # Переименовываем скомпилированный main.exe в StreamTail-Windows.exe
        mv build_dist/main.exe build_dist/StreamTail-Windows.exe

    - name: Post-process Linux build
      if: matrix.os == 'ubuntu-22.04'
      shell: bash
      run: |
        # Переименовываем бинарник с проверкой расширения (.bin или без него)
        if [ -f build_dist/main.bin ]; then
          mv build_dist/main.bin build_dist/StreamTail-Linux
        else
          mv build_dist/main build_dist/StreamTail-Linux
        fi

    - name: Post-process macOS build (Create ZIP of .app bundle)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        # Переименовываем бандл и архивируем в ZIP для сохранения структуры папок
        mv build_dist/main.app build_dist/StreamTail.app
        cd build_dist
        zip -r ../StreamTail-macOS.zip StreamTail.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.upload_path }}
