name: Build Nuitka Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        include:
          - os: windows-latest
            artifact_name: StreamTail-Windows
            nuitka_flags: "--windows-console-mode=disable --windows-company-name=Vadim0102 --windows-product-name=StreamTail"
            upload_path: "build_dist/StreamTail-Windows.exe"
            
          - os: ubuntu-22.04
            artifact_name: StreamTail-Linux
            nuitka_flags: ""
            upload_path: "build_dist/StreamTail-Linux"
            
          - os: macos-latest
            artifact_name: StreamTail-macOS
            nuitka_flags: "--macos-disable-console --macos-create-app-bundle"
            upload_path: "StreamTail-macOS.zip"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: Extract version from app/core/__init__.py
      id: get_version
      shell: bash
      run: |
        # Исправлено: Явное указание encoding='utf-8' предотвращает краш на Windows-раннерах
        VERSION=$(python -c "with open('app/core/__init__.py', encoding='utf-8') as f: exec(f.read()); print(__version__)")
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Extracted Version: $VERSION"

    - name: Build with Nuitka
      run: |
        # Исправлено: Удален недопустимый флаг --name
        python -m nuitka --standalone \
                         --onefile \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --file-version=${{ env.APP_VERSION }} \
                         --product-version=${{ env.APP_VERSION }} \
                         --output-dir=build_dist \
                         ${{ matrix.nuitka_flags }} \
                         main.py

    - name: Post-process Windows build
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # Переименовываем стандартный main.exe в StreamTail-Windows.exe
        mv build_dist/main.exe build_dist/StreamTail-Windows.exe

    - name: Post-process Linux build
      if: matrix.os == 'ubuntu-22.04'
      shell: bash
      run: |
        # Переименовываем бинарник с учетом возможных расширений (.bin или без него)
        if [ -f build_dist/main.bin ]; then
          mv build_dist/main.bin build_dist/StreamTail-Linux
        else
          mv build_dist/main build_dist/StreamTail-Linux
        fi

    - name: Post-process macOS build (Create ZIP of .app bundle)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        # Переименовываем бандл main.app в StreamTail.app и упаковываем в архив
        mv build_dist/main.app build_dist/StreamTail.app
        cd build_dist
        zip -r ../StreamTail-macOS.zip StreamTail.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.upload_path }}
