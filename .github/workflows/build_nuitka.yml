name: Build Nuitka Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        include:
          - os: windows-latest
            artifact_name: StreamTail-Windows
            nuitka_flags: "--onefile --windows-console-mode=disable --windows-company-name=Vadim0102 --windows-product-name=StreamTail"
            upload_path: "build_installer/StreamTail-Installer-Windows.exe"

          - os: ubuntu-22.04
            artifact_name: StreamTail-Linux
            nuitka_flags: "--onefile"
            upload_path: "build_dist/StreamTail-Linux"

          - os: macos-latest
            artifact_name: StreamTail-macOS
            nuitka_flags: "--macos-disable-console --macos-create-app-bundle"
            upload_path: "StreamTail-macOS.zip"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -U nuitka

    - name: Extract version from app/core/__init__.py
      id: get_version
      shell: bash
      run: |
        cat << 'EOF' > get_version.py
        import re
        with open("app/core/__init__.py", "r", encoding="utf-8") as f:
            text = f.read()
        
        ver_match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', text)
        ver = ver_match.group(1) if ver_match else "2.1.0"
        
        clean_ver = re.sub(r'[^0-9.]', '', ver.split('-')[0])
        parts = clean_ver.split('.')
        while len(parts) < 4:
            parts.append('0')
        win_ver = '.'.join(parts[:4])
        
        print(f"APP_VERSION={ver}")
        print(f"WIN_VERSION={win_ver}")
        EOF
        
        python get_version.py >> $GITHUB_ENV
        rm get_version.py

    - name: Build with Nuitka
      shell: bash
      run: |
        # Добавлен параметр --include-package=app для компиляции динамических пакетов плагинов
        python -m nuitka --standalone \
                         --enable-plugin=tk-inter \
                         --include-package-data=sv_ttk \
                         --include-package=uvicorn \
                         --include-package=plyer \
                         --include-package=app \
                         --file-version=${{ env.WIN_VERSION }} \
                         --product-version=${{ env.WIN_VERSION }} \
                         --output-filename=StreamTail \
                         --output-dir=build_dist \
                         --assume-yes-for-downloads \
                         ${{ matrix.nuitka_flags }} \
                         main.py

    - name: Post-process Windows build
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mv build_dist/StreamTail.exe build_dist/StreamTail-Windows.exe

    - name: Compile Windows Installer (Inno Setup)
      if: matrix.os == 'windows-latest'
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Post-process Linux build
      if: matrix.os == 'ubuntu-22.04'
      shell: bash
      run: |
        if [ -f build_dist/StreamTail.bin ]; then
          mv build_dist/StreamTail.bin build_dist/StreamTail-Linux
        else
          mv build_dist/StreamTail build_dist/StreamTail-Linux
        fi

    - name: Post-process macOS build (Create ZIP of .app bundle)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mv build_dist/main.app build_dist/StreamTail.app
        cd build_dist
        zip -r ../StreamTail-macOS.zip StreamTail.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.upload_path }}
